<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Navy blue background (Cincinnati flag navy) -->
  <rect width="32" height="32" rx="6" fill="#1A4A6B"/>

  <!-- Stylized "C" arc — references the circular motif of the Cincinnati seal -->
  <!-- Outer arc path: large arc from ~1 o'clock to ~5 o'clock position, open on the right -->
  <path
    d="M 22 7
       A 10 10 0 1 0 22 25"
    fill="none"
    stroke="white"
    stroke-width="4.5"
    stroke-linecap="round"
  />

  <!-- Three small horizontal data bars in the "C" opening — civic data reference -->
  <rect x="19" y="12" width="6" height="2" rx="1" fill="#7BAFD4"/>
  <rect x="19" y="15.5" width="8" height="2" rx="1" fill="white" opacity="0.85"/>
  <rect x="19" y="19" width="5" height="2" rx="1" fill="#7BAFD4"/>
</svg>
